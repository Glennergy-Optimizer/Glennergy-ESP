name: Doxygen Batch Campaign

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or ref to check out for the campaign run"
        required: false
        default: "dev"
      model:
        description: "OpenAI model to use for this campaign"
        required: false
        default: "gpt-5.4-mini"
      campaign_label:
        description: "Optional label used in branch names, summaries, and PR titles"
        required: false
        default: ""
      batch_file:
        description: "Path to the batch list file inside the repository"
        required: false
        default: "tools/doxygen_ai/batches_manual.txt"

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  run-batches:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ github.event.inputs.model }}
      TARGET_REF: ${{ github.event.inputs.target_ref }}
      CAMPAIGN_LABEL: ${{ github.event.inputs.campaign_label }}
      BATCH_FILE: ${{ github.event.inputs.batch_file }}
      MAX_FILES_PER_RUN: "20"
      MAX_CHARS_PER_FILE: "18000"
      OPENAI_MAX_OUTPUT_TOKENS: "150000"
      OPENAI_INPUT_COST_PER_MILLION: "0.25"
      OPENAI_OUTPUT_COST_PER_MILLION: "2.00"
      OPENAI_USD_TO_SEK: "9.19981"
    steps:
      - name: Derive PR metadata
        run: |
          if [ -n "${CAMPAIGN_LABEL}" ]; then
            SAFE_LABEL=$(printf '%s' "${CAMPAIGN_LABEL}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-//' | sed 's/-$//')
          else
            SAFE_LABEL="campaign-${GITHUB_RUN_ID}"
          fi

          if [ -z "${SAFE_LABEL}" ]; then
            SAFE_LABEL="campaign-${GITHUB_RUN_ID}"
          fi

          echo "PR_BRANCH=docs/doxygen-campaign-${SAFE_LABEL}" >> "$GITHUB_ENV"
          echo "PR_TITLE=[skip-doxygen] docs: Doxygen batch campaign ${SAFE_LABEL}" >> "$GITHUB_ENV"
          echo "SAFE_LABEL=${SAFE_LABEL}" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run batch campaign
        id: campaign
        shell: bash
        run: |
          set -u

          if [ ! -f "${BATCH_FILE}" ]; then
            echo "Batch file not found: ${BATCH_FILE}" >&2
            exit 1
          fi

          mkdir -p tools/doxygen_ai/state tools/doxygen_ai/rejected
          results_file="tools/doxygen_ai/state/campaign_results.txt"
          : > "${results_file}"

          success_count=0
          failure_count=0
          batch_index=0
          total_input_tokens=0
          total_output_tokens=0
          total_cost_usd=0
          total_cost_sek=0

          while IFS= read -r batch_line || [ -n "${batch_line}" ]; do
            batch_trimmed="$(printf '%s' "${batch_line}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            if [ -z "${batch_trimmed}" ]; then
              continue
            fi
            case "${batch_trimmed}" in
              \#*) continue ;;
            esac

            batch_index=$((batch_index + 1))
            manifest_path="tools/doxygen_ai/state/campaign_manifest_${batch_index}.json"
            batch_label="${SAFE_LABEL}-batch-${batch_index}"

            {
              echo "## Campaign Batch ${batch_index}"
              echo
              echo "\`${batch_trimmed}\`"
              echo
            } >> "$GITHUB_STEP_SUMMARY"

            if python tools/doxygen_ai/update_docs.py \
              --files "${batch_trimmed}" \
              --manifest "${manifest_path}" \
              --model "${OPENAI_MODEL}" \
              --test-label "${batch_label}" \
              --max-files 20; then
              success_count=$((success_count + 1))
              printf '%s|success|%s\n' "${batch_index}" "${batch_trimmed}" >> "${results_file}"
            else
              IFS=',' read -ra batch_paths <<< "${batch_trimmed}"
              for raw_path in "${batch_paths[@]}"; do
                path="$(printf '%s' "${raw_path}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
                if [ -n "${path}" ]; then
                  git restore --worktree --source=HEAD -- "${path}" || true
                fi
              done
              failure_count=$((failure_count + 1))
              printf '%s|failed|%s\n' "${batch_index}" "${batch_trimmed}" >> "${results_file}"
            fi

            if [ -f "${manifest_path}" ]; then
              batch_totals="$(python -c 'import json, sys; payload=json.load(open(sys.argv[1], "r", encoding="utf-8")); input_tokens=sum(int(entry.get("input_tokens") or 0) for entry in payload.get("files", [])); output_tokens=sum(int(entry.get("output_tokens") or 0) for entry in payload.get("files", [])); print(f"{input_tokens}|{output_tokens}")' "${manifest_path}")"
              batch_input_tokens="${batch_totals%%|*}"
              batch_output_tokens="${batch_totals##*|}"

              batch_costs="$(python -c 'import sys; input_tokens=int(sys.argv[1]); output_tokens=int(sys.argv[2]); input_cost_per_million=float(sys.argv[3]); output_cost_per_million=float(sys.argv[4]); usd_to_sek=float(sys.argv[5]); cost_usd=((input_tokens / 1_000_000) * input_cost_per_million) + ((output_tokens / 1_000_000) * output_cost_per_million); cost_sek=cost_usd * usd_to_sek; print(f"{cost_usd:.6f}|{cost_sek:.6f}")' "${batch_input_tokens}" "${batch_output_tokens}" "${OPENAI_INPUT_COST_PER_MILLION}" "${OPENAI_OUTPUT_COST_PER_MILLION}" "${OPENAI_USD_TO_SEK}")"
              batch_cost_usd="${batch_costs%%|*}"
              batch_cost_sek="${batch_costs##*|}"

              total_input_tokens=$((total_input_tokens + batch_input_tokens))
              total_output_tokens=$((total_output_tokens + batch_output_tokens))
              total_cost_usd="$(python -c 'import sys; print(f"{float(sys.argv[1]) + float(sys.argv[2]):.6f}")' "${total_cost_usd}" "${batch_cost_usd}")"
              total_cost_sek="$(python -c 'import sys; print(f"{float(sys.argv[1]) + float(sys.argv[2]):.6f}")' "${total_cost_sek}" "${batch_cost_sek}")"

              {
                echo "- Batch ${batch_index} estimated tokens: input=${batch_input_tokens}, output=${batch_output_tokens}"
                echo "- Batch ${batch_index} estimated cost: \$${batch_cost_usd} / ${batch_cost_sek} kr"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done < "${BATCH_FILE}"

          {
            echo "## Campaign Summary"
            echo
            echo "- Target ref: ${TARGET_REF}"
            echo "- Requested model: ${OPENAI_MODEL}"
            echo "- Batch file: \`${BATCH_FILE}\`"
            echo "- Successful batches: ${success_count}"
            echo "- Failed batches: ${failure_count}"
            echo "- Total input tokens: ${total_input_tokens}"
            echo "- Total output tokens: ${total_output_tokens}"
            echo "- Estimated total cost (USD): \$${total_cost_usd}"
            echo "- Estimated total cost (SEK): ${total_cost_sek} kr"
            echo
            echo "### Batch Results"
            while IFS='|' read -r idx status batch; do
              echo "- Batch ${idx} [${status}]: \`${batch}\`"
            done < "${results_file}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "success_count=${success_count}" >> "$GITHUB_OUTPUT"
          echo "failure_count=${failure_count}" >> "$GITHUB_OUTPUT"
          echo "results_file=${results_file}" >> "$GITHUB_OUTPUT"
          echo "total_input_tokens=${total_input_tokens}" >> "$GITHUB_OUTPUT"
          echo "total_output_tokens=${total_output_tokens}" >> "$GITHUB_OUTPUT"
          echo "total_cost_usd=${total_cost_usd}" >> "$GITHUB_OUTPUT"
          echo "total_cost_sek=${total_cost_sek}" >> "$GITHUB_OUTPUT"

      - name: Upload rejected outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-batch-campaign-rejected-${{ github.run_id }}
          path: tools/doxygen_ai/rejected
          if-no-files-found: ignore

      - name: Upload campaign state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-batch-campaign-state-${{ github.run_id }}
          path: tools/doxygen_ai/state
          if-no-files-found: ignore

      - name: Create draft pull request with successful batch updates
        if: always() && steps.campaign.outputs.success_count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[skip-doxygen] docs: apply Doxygen batch campaign"
          branch: ${{ env.PR_BRANCH }}
          delete-branch: true
          title: ${{ env.PR_TITLE }}
          body: |
            This draft PR contains successful documentation updates from a Doxygen batch campaign.

            Requested model: `${{ env.OPENAI_MODEL }}`
            Target ref: `${{ env.TARGET_REF }}`
            Campaign label: `${{ env.CAMPAIGN_LABEL || env.SAFE_LABEL }}`
            Batch file: `${{ env.BATCH_FILE }}`
            Successful batches: `${{ steps.campaign.outputs.success_count }}`
            Failed batches: `${{ steps.campaign.outputs.failure_count }}`
            Total input tokens: `${{ steps.campaign.outputs.total_input_tokens }}`
            Total output tokens: `${{ steps.campaign.outputs.total_output_tokens }}`
            Estimated total cost (USD): `${{ steps.campaign.outputs.total_cost_usd }}`
            Estimated total cost (SEK): `${{ steps.campaign.outputs.total_cost_sek }} kr`

            Notes:
            - successful batches are included in this PR
            - failed batches were skipped so the campaign could continue
            - files from failed batches were restored, so only successful batches are included
            - review the uploaded artifacts for rejected outputs and batch manifests
          draft: true
          base: ${{ env.TARGET_REF }}
