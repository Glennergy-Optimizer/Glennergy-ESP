<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#263238"/>
    </marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#1f2933}
      .box{fill:#f8fafc;stroke:#263238;stroke-width:2.4;rx:12}
      .task{fill:#e3f2fd;stroke:#1565c0;stroke-width:2.6;rx:12}
      .state{fill:#fff8e1;stroke:#f57f17;stroke-width:2.6;rx:12}
      .ui{fill:#f3e5f5;stroke:#6a1b9a;stroke-width:2.6;rx:12}
      .label{font:700 21px Arial,sans-serif;fill:#1f2933}
      .sub{font:15px Arial,sans-serif;fill:#455a64}
      .line{stroke:#263238;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .bi{stroke:#263238;stroke-width:2.4;fill:none;marker-start:url(#arrow);marker-end:url(#arrow)}
      .small{font:14px Arial,sans-serif;fill:#37474f}
    </style>
  </defs>

  <rect width="1400" height="820" fill="#fff"/>
