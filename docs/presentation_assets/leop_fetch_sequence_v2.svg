<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">LEOP Fetch Sequence v2</title>
  <desc id="desc">Clear sequence diagram for LEOP fetch flow with vertical lifelines for WiFi, HTTP, server, cache, parser and UI queues.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #0f172a; font: 700 38px Arial, sans-serif; }
      .head { fill: #eaf4ff; stroke: #1d70c9; stroke-width: 2.5; }
      .headText { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .msg { stroke: #263238; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowSlate); }
      .noteBox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.7; }
      .altBox { fill: #fbfdff; stroke: #94a3b8; stroke-width: 1.8; }
      .okBox { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.8; }
      .warnBox { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.8; }
      .label { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .small { fill: #334155; font: 500 15px Arial, sans-serif; }
      .tiny { fill: #64748b; font: 500 13px Arial, sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#263238"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>
  <text class="title" x="60" y="64">LEOP Fetch Sequence</text>
  <text class="tiny" x="60" y="92">Accurate to current ESP32 client flow: cache fallback is used when WiFi is disconnected.</text>

  <g id="participants">
    <rect class="head" x="60" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="145" y="160" text-anchor="middle">LEOP fetcher</text>

    <rect class="head" x="270" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="355" y="160" text-anchor="middle">WiFi state</text>

    <rect class="head" x="480" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="565" y="160" text-anchor="middle">HTTP client</text>

    <rect class="head" x="690" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="775" y="160" text-anchor="middle">LEOP server</text>

    <rect class="head" x="900" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="985" y="160" text-anchor="middle">SPIFFS cache</text>

    <rect class="head" x="1110" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="1195" y="160" text-anchor="middle">DataParser</text>

    <rect class="head" x="1320" y="125" width="170" height="58" rx="10"/>
    <text class="headText" x="1405" y="160" text-anchor="middle">UI queues</text>
  </g>

  <line class="life" x1="145" y1="183" x2="145" y2="900"/>
  <line class="life" x1="355" y1="183" x2="355" y2="900"/>
  <line class="life" x1="565" y1="183" x2="565" y2="900"/>
  <line class="life" x1="775" y1="183" x2="775" y2="900"/>
  <line class="life" x1="985" y1="183" x2="985" y2="900"/>
  <line class="life" x1="1195" y1="183" x2="1195" y2="900"/>
  <line class="life" x1="1405" y1="183" x2="1405" y2="900"/>

  <rect class="noteBox" x="48" y="210" width="1460" height="56" rx="8"/>
  <text class="label" x="68" y="244">Loop: every configured fetch interval</text>

  <line class="msg" x1="145" y1="300" x2="355" y2="300"/>
  <text class="small" x="196" y="288">WiFi_IsConnected()</text>

  <rect class="okBox" x="48" y="335" width="1460" height="300" rx="8"/>
  <text class="label" x="68" y="367">If WiFi is connected</text>

  <line class="ret" x1="355" y1="395" x2="145" y2="395"/>
  <text class="small" x="208" y="383">connected = true</text>

  <line class="msg" x1="145" y1="435" x2="565" y2="435"/>
  <text class="small" x="236" y="423">GET recommendation / weather / price</text>

  <line class="msg" x1="565" y1="485" x2="775" y2="485"/>
  <text class="small" x="626" y="473">HTTP GET</text>

  <line class="ret" x1="775" y1="535" x2="565" y2="535"/>
  <text class="small" x="622" y="523">JSON array</text>

  <line class="ret" x1="565" y1="585" x2="145" y2="585"/>
  <text class="small" x="286" y="573">HTTPResponse.data</text>

  <line class="msg" x1="145" y1="615" x2="985" y2="615"/>
  <text class="small" x="466" y="603">write live JSON cache</text>

  <rect class="warnBox" x="48" y="665" width="1460" height="145" rx="8"/>
  <text class="label" x="68" y="697">If WiFi is disconnected</text>

  <line class="ret" x1="355" y1="730" x2="145" y2="730"/>
  <text class="small" x="205" y="718">connected = false</text>

  <line class="msg" x1="145" y1="770" x2="985" y2="770"/>
  <text class="small" x="464" y="758">load cached JSON files</text>

  <line class="ret" x1="985" y1="800" x2="145" y2="800"/>
  <text class="small" x="474" y="788">cached JSON</text>

  <line class="msg" x1="145" y1="850" x2="1195" y2="850"/>
  <text class="small" x="555" y="838">parse raw or cached JSON</text>

  <line class="ret" x1="1195" y1="885" x2="145" y2="885"/>
  <text class="small" x="586" y="873">typed lists or parse failure</text>

  <line class="msg" x1="145" y1="925" x2="1405" y2="925"/>
  <text class="small" x="573" y="913">publish lists to queues when available; failed fetches keep status=false</text>
</svg>
